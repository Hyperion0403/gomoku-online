<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GOMOKU ONLINE</title>
    <link rel="stylesheet" href="./styles.css?v=8" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="./config.js" defer></script>
    <script src="./app.js?v=21" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="game-area" aria-label="五子棋棋盘">
        <div class="topbar">
          <p class="eyebrow">GOMOKU ONLINE</p>
          <div class="turn-card" id="turnCard">
            <span class="stone black" aria-hidden="true"></span>
            <span id="turnText">黑棋先手</span>
            <strong class="timer-text" id="timerText" hidden>25</strong>
          </div>
        </div>

        <div class="board-wrap">
          <div class="board" id="board" role="grid" aria-label="15乘15五子棋棋盘"></div>
        </div>
      </section>

      <aside class="panel" aria-label="对战控制台">
        <section class="section">
          <h2>房间</h2>
          <div class="status" id="networkStatus">本地模式</div>
          <div class="color-pick" role="group" aria-label="联机执棋选择">
            <button id="blackPickBtn" class="color-choice active" type="button">
              <span class="stone black" aria-hidden="true"></span>
              我执黑
            </button>
            <button id="whitePickBtn" class="color-choice" type="button">
              <span class="stone white" aria-hidden="true"></span>
              我执白
            </button>
          </div>
          <div class="rule-pick" role="group" aria-label="规则选择">
            <button id="freeRuleBtn" class="rule-choice active" type="button">自由规则</button>
            <button id="renjuRuleBtn" class="rule-choice" type="button">禁手规则</button>
          </div>
          <div class="timer-pick" role="group" aria-label="倒计时选择">
            <button id="noTimerBtn" class="timer-choice active" type="button">不限时</button>
            <button id="timer25Btn" class="timer-choice" type="button">每手25秒</button>
          </div>
          <div class="room-row">
            <input id="roomInput" type="text" autocomplete="off" spellcheck="false" placeholder="输入房间码" aria-label="房间码" />
            <button id="joinBtn" class="secondary">加入</button>
          </div>
          <div class="actions">
            <button id="hostBtn">创建房间</button>
            <button id="copyBtn" class="secondary">复制邀请链接</button>
          </div>
          <div class="actions solo-actions">
            <button id="aiBtn" class="secondary">AI对战</button>
            <button id="localBtn" class="secondary">本地双人</button>
          </div>
          <div class="voice-panel">
            <div class="voice-status" id="voiceStatus">语音未开启</div>
            <div class="voice-actions">
              <button id="voiceBtn" class="secondary" disabled>开启语音</button>
              <button id="muteBtn" class="secondary" disabled>静音</button>
              <button id="hangupBtn" class="secondary" disabled>挂断</button>
            </div>
            <audio id="remoteAudio" autoplay playsinline></audio>
          </div>
          <p class="hint" id="shareHint">配置 Supabase 后，把邀请链接发给好友即可对战。</p>
        </section>

        <section class="section">
          <h2>棋局</h2>
          <div class="score">
            <div>
              <span class="stone black" aria-hidden="true"></span>
              <strong id="blackScore">0</strong>
              <small>黑棋</small>
            </div>
            <div>
              <span class="stone white" aria-hidden="true"></span>
              <strong id="whiteScore">0</strong>
              <small>白棋</small>
            </div>
          </div>
          <div class="actions">
            <button id="undoBtn" class="secondary">悔棋</button>
            <button id="resetBtn" class="danger">重开</button>
          </div>
          <div class="undo-prompt" id="undoPrompt" hidden>
            <p id="undoPromptText">对方请求撤回上一手</p>
            <div class="actions" id="undoPromptActions">
              <button id="acceptUndoBtn">同意</button>
              <button id="rejectUndoBtn" class="secondary">拒绝</button>
            </div>
          </div>
        </section>

        <section class="section">
          <h2>记录</h2>
          <ol class="moves" id="movesList" aria-live="polite"></ol>
        </section>
      </aside>
    </main>

    <div class="result-overlay" id="resultOverlay" hidden>
      <section class="result-dialog" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <button class="result-close" id="resultCloseBtn" type="button" aria-label="关闭结算弹窗">×</button>
        <img class="result-art" id="resultArt" src="./assets/result-win.png" alt="" />
        <div class="result-copy">
          <h2 id="resultTitle">赢啦！</h2>
          <p id="resultMessage">漂亮的一局，再来一盘？</p>
        </div>
        <button class="result-replay" id="resultReplayBtn" type="button">再来一局</button>
      </section>
    </div>
  </body>
</html>
